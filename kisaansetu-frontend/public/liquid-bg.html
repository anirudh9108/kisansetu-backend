<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: #000; }
    #root { width: 100%; height: 100%; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "framer-motion": "https://esm.sh/framer-motion@10.16.4"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';
    import LiquidImage from 'https://framer.com/m/LiquidImage-DMcO.js@d5N4U4KU0IvNA682lxBZ';

    const root = createRoot(document.getElementById('root'));
    root.render(
      React.createElement(LiquidImage, { 
        style: { width: "100%", height: "100%" },
        image: "https://images.unsplash.com/photo-1542601906990-b4d3fb778b09?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80",
        amplitude: 1,
        frequency: 1,
        speed: 1
      })
    );
  </script>
</body>
</html>
